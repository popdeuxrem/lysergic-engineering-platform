contract:
  id: urn:lep:contract:operations.gate
  version: 1.0.0
  name: LEP Operations Gate Contract
gate:
  types:
    - schema
    - test
    - security
    - documentation
    - architecture
  outcomes:
    - pass
    - fail
    - warning
  rules:
    - required_failed_gates_block_completion
    - results_recorded_permanently
