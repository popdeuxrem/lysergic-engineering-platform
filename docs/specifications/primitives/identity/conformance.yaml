    check: "properties.immutable.const == true"
    required: true
  - id: "IDENTITY-011"
    description: "id and uri are both required"
    scope: schema
    check: "required array includes id, uri, and immutable"
    required: true
  - id: "IDENTITY-012"
    description: "Explicit lineage model declared"
    scope: schema
    check: "lineage object with parent, supersedes, superseded_by"
    required: true
validation:
